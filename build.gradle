// build.gradle

def getGitHash() {
    def githubSha = System.getenv("GITHUB_SHA")
    if (githubSha != null && githubSha.length() >= 10) {
        return githubSha.substring(0, 10)
    }
    try {
        def stdout = new ByteArrayOutputStream()
        exec {
            commandLine 'git', 'rev-parse', '--short=10', 'HEAD'
            standardOutput = stdout
        }
        def hash = stdout.toString().trim()
        if (!hash.isEmpty()) {
            return hash
        }
    } catch (Exception ignored) {
    }
    return "local-SNAPSHOT"
}

allprojects {
    group = "net.uebliche.minestom-extras"
    version = getGitHash()
}


subprojects { p ->


    apply {
        plugin("java-library")
        plugin("maven-publish")
    }

    if (project(":common") != p) {
        dependencies {
            api(project(":common"))
            testImplementation project(path: ':common', configuration: 'testExport')
        }

        tasks.named('compileTestJava') {
            dependsOn project(':common').tasks.named('compileTestJava')
        }

    }
    if (project(":example") != p) {
        publishing {
            publications {

                // Git-Hash-Version
                gpr(MavenPublication) {
                    from components.java
                    artifactId = p.name
                    version = project.version
                }

            }

            repositories {
                maven {
                    name = "GitHubPackages"
                    url = uri("https://maven.pkg.github.com/uebliche/minestom-extras")
                    credentials {
                        username = System.getenv("GITHUB_ACTOR") ?: "USERNAME"
                        password = System.getenv("GITHUB_TOKEN") ?: "TOKEN"
                    }
                }
            }
        }
    } else {
        dependencies {
            implementation(project(":all"))
            implementation("ch.qos.logback:logback-classic:1.5.38")
        }
    }


    dependencies {
        implementation(libs.minestom)
        implementation(libs.slf4j.api)

        testImplementation 'org.junit.jupiter:junit-jupiter-api:6.1.2'
        testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:6.1.2'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.1.2'
    }

    java {
        withSourcesJar()
        withJavadocJar()
    }

    repositories {
        mavenCentral()
    }

    test {
        useJUnitPlatform()
        failOnNoDiscoveredTests = false
    }
}
